<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Coming soon — PYTHAI</title>
<meta name="robots" content="noindex" />
<link rel="icon" type="image/svg+xml" href="/assets/logo/pythai-oculus.svg" />
<link rel="stylesheet" href="/styles.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg-base); color: var(--text-primary); font-family: var(--font-ui);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    text-align: center; overflow: hidden; position: relative;
  }
  .bg { position: absolute; inset: 0; z-index: 0; }
  .bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.42; }
  .veil1 { position: absolute; inset: 0; background: radial-gradient(70% 60% at 50% 40%, rgba(8,9,12,0.25) 0%, rgba(8,9,12,0.82) 64%, var(--void) 100%); }
  .veil2 { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(8,9,12,0.6) 0%, transparent 28%, transparent 66%, var(--void) 100%); }
  .dust { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .wrap { position: relative; z-index: 1; padding: 0 24px; max-width: 640px; }
  .mark { width: 78px; height: 78px; margin: 0 auto 26px; filter: drop-shadow(0 0 24px var(--glow-oracle)); }
  .eyebrow { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.34em; text-transform: uppercase;
    color: var(--text-oracle); margin: 0 0 24px; padding-left: 0.34em; }
  h1 { font-family: var(--font-oracle); font-weight: 400; letter-spacing: -0.02em;
    font-size: clamp(30px, 5vw, 54px); line-height: 1.08; margin: 0; color: var(--text-primary); }
  p.sub { font-family: var(--font-ui); font-size: 18px; line-height: 1.6; color: var(--text-secondary);
    max-width: 460px; margin: 22px auto 0; }
  .cta { display: inline-flex; align-items: center; gap: 8px; margin-top: 36px;
    font-family: var(--font-oracle); font-weight: 600; font-size: 16px; letter-spacing: 0.03em;
    text-decoration: none; color: var(--text-on-gold); background: var(--oracle);
    padding: 13px 26px; border-radius: 6px; box-shadow: 0 0 28px var(--glow-oracle-soft);
    transition: background .25s, box-shadow .25s; }
  .cta:hover { background: var(--oracle-bright); box-shadow: 0 0 40px var(--glow-oracle); }
  .code { font-family: var(--font-mono); font-size: 13px; color: var(--text-muted); letter-spacing: 0.2em; margin-top: 30px; }
</style>
</head>
<body>
  <div class="bg">
    <img src="/assets/imagery/sanctum-boardroom.png" alt="" />
    <div class="veil1"></div>
    <div class="veil2"></div>
    <canvas class="dust"></canvas>
  </div>
  <div class="wrap">
    <img class="mark" src="/assets/logo/pythai-oculus.svg" alt="PYTHAI" />
    <p class="eyebrow" data-de="Bald verfügbar">Coming soon</p>
    <h1 data-de="Google-Login ist auf dem Weg.">Google sign-in is on its way.</h1>
    <p class="sub" data-de="Nutze solange einfach deine E-Mail — Warren schickt dir einen einmaligen Link, kein Passwort nötig.">For now, use your email — Warren sends you a one-time link, no password needed.</p>
    <a class="cta" href="/register.html" data-de="Mit E-Mail anmelden &nearr;">Continue with email &nearr;</a>
    <div class="code">PYTHAI · pythai.ch</div>
  </div>
  <script>
    (function () {
      var c = document.querySelector('canvas.dust'); if (!c) return;
      var ctx = c.getContext('2d'); if (!ctx) return;
      var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var dpr = Math.min(window.devicePixelRatio || 1, 2), w = 0, h = 0, parts = [], raf = 0, t = 0;
      function resize() { var r = c.getBoundingClientRect(); w = r.width; h = r.height; c.width = Math.max(1, w * dpr | 0); c.height = Math.max(1, h * dpr | 0); ctx.setTransform(dpr, 0, 0, dpr, 0, 0); }
      function mk(big) { return big ? { big: 1, x: Math.random() * w, y: Math.random() * h, r: 5 + Math.random() * 9, vx: (Math.random() - 0.5) * 0.05, vy: -(0.015 + Math.random() * 0.05), a: 0.08 + Math.random() * 0.14, ph: Math.random() * 6.28, sp: 0.3 + Math.random() * 0.6 } : { big: 0, x: Math.random() * w, y: Math.random() * h, r: 0.5 + Math.random() * 1.7, vx: (Math.random() - 0.5) * 0.1, vy: -(0.04 + Math.random() * 0.16), a: 0.18 + Math.random() * 0.5, ph: Math.random() * 6.28, sp: 0.5 + Math.random() * 1.1 }; }
      function init() { parts = []; for (var i = 0; i < 44; i++) parts.push(mk(false)); var B = Math.max(7, Math.round(w / 200)); for (var j = 0; j < B; j++) parts.push(mk(true)); }
      function dot(p, tw) { if (p.big) { var g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r); g.addColorStop(0, 'rgba(242,206,122,' + tw + ')'); g.addColorStop(1, 'rgba(242,206,122,0)'); ctx.shadowBlur = 0; ctx.fillStyle = g; } else { ctx.shadowColor = 'rgba(242,206,122,0.85)'; ctx.shadowBlur = p.r * 4; ctx.fillStyle = 'rgba(242,206,122,' + tw + ')'; } ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.2832); ctx.fill(); }
      function frame() { t += 0.016; ctx.clearRect(0, 0, w, h); for (var i = 0; i < parts.length; i++) { var p = parts[i]; p.x += p.vx; p.y += p.vy; var m = p.r + 4; if (p.y < -m) { p.y = h + m; p.x = Math.random() * w; } if (p.x < -m) p.x = w + m; else if (p.x > w + m) p.x = -m; dot(p, (p.a * (0.55 + 0.45 * Math.sin(t * p.sp + p.ph))).toFixed(3)); } raf = requestAnimationFrame(frame); }
      resize(); init();
      if (reduce) { ctx.clearRect(0, 0, w, h); for (var i = 0; i < parts.length; i++) dot(parts[i], (parts[i].a * 0.7).toFixed(3)); }
      else frame();
      window.addEventListener('resize', function () { resize(); init(); });
    })();
  </script>
  <script>
    (function () {
      var stored = null; try { stored = localStorage.getItem('py_lang'); } catch (e) {}
      var nav = ((navigator.language || 'en')).toLowerCase();
      var de = stored === 'de' || (stored !== 'en' && nav.indexOf('de') === 0);
      if (de) {
        document.documentElement.lang = 'de';
        document.querySelectorAll('[data-de]').forEach(function (el) { el.innerHTML = el.getAttribute('data-de'); });
      }
    })();
  </script>
</body>
</html>
