<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Methodik — PYTHAI</title>
<meta name="description" content="Wie liest man das Daily Oracle? Idea-Score & Execute-Confidence, die Trading-Arten und das Glossar — die Grammatik hinter den Setups." />
<meta name="theme-color" content="#08090C" />
<link rel="canonical" href="https://pythai.ch/methodik.html" />
<link rel="icon" type="image/svg+xml" href="assets/logo/pythai-oculus.svg" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="PYTHAI" />
<meta property="og:title" content="Methodik — PYTHAI" />
<meta property="og:description" content="Die Grammatik hinter dem Daily Oracle — Idea-Score, Execute-Confidence und die Trading-Arten." />
<meta property="og:url" content="https://pythai.ch/methodik.html" />
<meta property="og:image" content="https://pythai.ch/assets/imagery/warren-2.png" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; background: var(--bg-base); color: var(--text-primary); }

  /* ── Methodik — Brand-Tokens statt Default-Hex ── */
  .methodik-hero,
  .methodik-section {
    max-width: 720px;
    margin: 0 auto;
    padding: 56px 24px;
    font-family: var(--font-ui);
    color: var(--mist);
  }
  .methodik-hero { padding-top: 72px; }

  .eyebrow,
  .section-label {
    font: 600 11px/1.3 var(--font-mono);
    letter-spacing: .2em;
    color: var(--oracle);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .methodik-hero h1 {
    font: 400 42px/1.15 var(--font-oracle);
    color: var(--parchment);
    letter-spacing: -.02em;
    margin: 0 0 18px;
  }
  .methodik-section h2 {
    font: 400 30px/1.2 var(--font-oracle);
    color: var(--parchment);
    margin: 0 0 24px;
  }
  .methodik-section h3 {
    font: 600 18px/1.3 var(--font-ui);
    color: var(--parchment);
    margin: 28px 0 10px;
  }
  .methodik-section h4 {
    font: 600 13px/1.3 var(--font-mono);
    letter-spacing: .12em;
    color: var(--oracle);
    text-transform: uppercase;
    margin: 22px 0 10px;
  }
  .methodik-section p { font-size: 15px; line-height: 1.7; }
  .methodik-hero .lead {
    font: 400 21px/1.6 var(--font-oracle);
    color: var(--text-secondary);
    margin: 0;
  }
  .methodik-section strong { color: var(--parchment); }
  .methodik-section em { color: var(--text-secondary); }

  /* Dual-Bucket */
  .dual-bucket { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 32px 0; }
  .bucket { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 22px; }
  .bucket.idea { border-left: 3px solid var(--oracle); }
  .bucket.execute { border-left: 3px solid #5B8FB8; }
  .bucket-label { font: 600 11px/1.3 var(--font-mono); letter-spacing: .16em; color: var(--parchment); text-transform: uppercase; margin-bottom: 10px; }
  .bucket-question { font: italic 400 15px/1.5 var(--font-oracle); color: var(--text-secondary); margin-bottom: 14px; }
  .bucket p { font: 400 14px/1.65 var(--font-ui); color: var(--mist); margin: 0; }

  /* Confidence-Stripe */
  .confidence-stripe { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; margin: 22px 0 8px; }
  .bucket-step { padding: 14px 8px; text-align: center; font: 600 11px/1.3 var(--font-mono); letter-spacing: .1em; color: var(--void); border-radius: 4px; }
  .bucket-step small { font: 500 10px/1 var(--font-ui); letter-spacing: 0; opacity: .75; display: block; margin-top: 3px; }
  .bucket-step[data-color="green"]     { background: #6FCF9A; }
  .bucket-step[data-color="lightgold"] { background: #E5C76F; }
  .bucket-step[data-color="gold"]      { background: var(--oracle); }
  .bucket-step[data-color="orange"]    { background: #E8A555; }
  .bucket-step[data-color="blue"]      { background: #5B8FB8; color: var(--parchment); }
  .bucket-step[data-color="red"]       { background: #E0726B; color: var(--parchment); }
  .hint { font: 400 13px/1.55 var(--font-ui); color: var(--text-muted); margin: 10px 0 0; }

  /* Callout */
  .callout-example { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 24px; margin: 28px 0; }
  .callout-label { font: 600 11px/1.3 var(--font-mono); letter-spacing: .16em; color: var(--oracle); text-transform: uppercase; margin-bottom: 14px; }
  .callout-example p { font: 400 14px/1.7 var(--font-ui); color: var(--mist); margin: 0 0 12px; }
  .callout-example p:last-child { margin-bottom: 0; }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font: 600 11px/1 var(--font-mono); letter-spacing: .06em; }
  .pill.green { background: #6FCF9A; color: var(--void); }
  .pill.red { background: #E0726B; color: var(--parchment); }

  /* Mode-Cards */
  .mode-card { background: var(--bg-raised); border: 1px solid var(--border-subtle); border-radius: 8px; padding: 28px; margin: 24px 0; }
  .mode-card h3 { font: 400 25px/1.15 var(--font-oracle); letter-spacing: -.01em; color: var(--parchment); margin: 0 0 6px; }
  .mode-meta { font: 500 12px/1.4 var(--font-mono); letter-spacing: .08em; color: var(--text-secondary); margin: 0 0 14px; }
  .how-to { margin: 8px 0 18px 0; padding: 0; list-style: none; }
  .how-to li { font: 400 14px/1.65 var(--font-ui); color: var(--mist); padding: 4px 0 4px 18px; position: relative; }
  .how-to li:before { content: "·"; color: var(--oracle); position: absolute; left: 4px; font-weight: bold; }
  .skim-table { width: 100%; border-collapse: collapse; margin: 8px 0 18px; font: 400 13px/1.5 var(--font-ui); }
  .skim-table th, .skim-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border-subtle); }
  .skim-table th { font: 600 11px/1.3 var(--font-mono); letter-spacing: .12em; color: var(--oracle); text-transform: uppercase; background: var(--void); }
  .skim-table td { color: var(--mist); }
  .why-box { background: var(--bg-elevated); border-left: 3px solid var(--oracle); padding: 14px 18px; margin: 16px 0 0; font: 400 13px/1.65 var(--font-ui); color: var(--text-secondary); }

  /* Risiko-Plakette pro Trade-Art */
  .risk-tag { display: inline-flex; align-items: center; gap: 9px; font: 600 11px/1 var(--font-mono); letter-spacing: .14em; text-transform: uppercase; padding: 8px 14px; border-radius: 999px; margin: 0 0 16px; }
  .risk-tag .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .risk-tag .risk-lvl { font-weight: 700; }
  .risk-tag.moderat  { background: rgba(229,199,111,.10); color: #E5C76F; border: 1px solid rgba(229,199,111,.32); }
  .risk-tag.moderat .dot  { background: #E5C76F; }
  .risk-tag.hoch     { background: rgba(232,165,85,.12);  color: #E8A555; border: 1px solid rgba(232,165,85,.40); }
  .risk-tag.hoch .dot     { background: #E8A555; }
  .risk-tag.hoechste { background: rgba(224,114,107,.14); color: #E0726B; border: 1px solid rgba(224,114,107,.46); }
  .risk-tag.hoechste .dot { background: #E0726B; }

  /* Warnbox — höchste Risikoklasse */
  .risk-warning { background: rgba(224,114,107,.07); border: 1px solid rgba(224,114,107,.42); border-left: 3px solid #E0726B; border-radius: 8px; padding: 15px 18px; margin: 0 0 18px; font: 400 14px/1.6 var(--font-ui); color: var(--parchment); }
  .risk-warning strong { color: #E0726B; }

  /* Legend */
  .legend-grid { display: grid; grid-template-columns: 180px 1fr; gap: 12px 24px; margin: 14px 0 0; }
  .legend-grid dt { font: 600 13px/1.5 var(--font-mono); letter-spacing: .04em; color: var(--parchment); }
  .legend-grid dd { font: 400 14px/1.55 var(--font-ui); color: var(--text-secondary); margin: 0; }

  /* Screenshots */
  .screenshot { margin: 24px 0; padding: 0; }
  .screenshot img { display: block; width: 100%; max-width: 560px; margin: 0 auto; border-radius: 8px; border: 1px solid var(--border-subtle); }
  .screenshot figcaption { font: italic 400 12px/1.5 var(--font-ui); color: var(--text-muted); text-align: center; margin-top: 10px; }
  .screenshot-ph { max-width: 560px; margin: 0 auto; min-height: 150px; border-radius: 8px; border: 1px dashed var(--border-strong); background: var(--bg-input); display: flex; align-items: center; justify-content: center; font: 400 11px/1 var(--font-mono); letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }

  /* Mobile */
  @media (max-width: 600px) {
    .methodik-hero h1 { font-size: 32px; }
    .methodik-section h2 { font-size: 24px; }
    .dual-bucket { grid-template-columns: 1fr; }
    .confidence-stripe { grid-template-columns: repeat(3, 1fr); }
    .legend-grid { grid-template-columns: 1fr; gap: 4px 0; }
    .legend-grid dt { margin-top: 14px; }
  }
</style>
</head>

</body>
